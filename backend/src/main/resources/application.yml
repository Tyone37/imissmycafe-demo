spring:
  datasource:
    url: jdbc:mysql://localhost:3306/imissmycafe_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: cafe_user
    password: cafe1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # validate: kiểm tra schema khớp với Entity — KHÔNG tự alter bảng
      # Schema do init.sql quản lý
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

# YouTube Data API key — đặt giá trị thực trong .env hoặc biến môi trường YOUTUBE_API_KEY
youtube:
  api-key: ${YOUTUBE_API_KEY:your-youtube-api-key-here}

# CORS: Angular dev + Vercel prod
cors:
  allowed-origins:
    - http://localhost:4200
    - https://imissmycafe-demo.vercel.app

logging:
  level:
    com.imissmycafe: DEBUG
    org.hibernate.SQL: DEBUG
