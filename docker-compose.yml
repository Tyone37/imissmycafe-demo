version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: imissmycafe-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: imissmycafe_db
      MYSQL_USER: cafe_user
      MYSQL_PASSWORD: cafe1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cafe-network

volumes:
  mysql_data:

networks:
  cafe-network:
    driver: bridge